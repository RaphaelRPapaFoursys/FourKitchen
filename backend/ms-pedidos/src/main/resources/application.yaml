spring:
  config:
    # Carrega o .env local do ms-pedidos ao executar pela IDE ou terminal.
    # O primeiro caminho atende execucao dentro de backend/ms-pedidos;
    # o segundo atende execucao a partir da raiz do projeto.
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/ms-pedidos/.env[.properties]
  application:
    name: ms-pedidos
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 20000
      connection-timeout: 10000
      max-lifetime: 60000
server:
  port: ${SERVER_PORT:8083}
