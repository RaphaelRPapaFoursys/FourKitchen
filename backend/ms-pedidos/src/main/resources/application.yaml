spring:
  application:
    name: ms-pedidos
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 600000
      connection-timeout: 10000
      max-lifetime: 1800000
server:
  port: ${SERVER_PORT:8083}
