spring:
  application:
    name: db-migrations
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    hikari:
      maximum-pool-size: 1
      minimum-idle: 0
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG