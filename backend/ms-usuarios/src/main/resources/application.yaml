spring:
  application:
    name: ms-usuarios
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 600000
      connection-timeout: 15000
      validation-timeout: 3000
      keepalive-time: 60000
      max-lifetime: 900000
  jpa:
    hibernate:
      ddl-auto: none

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS}
