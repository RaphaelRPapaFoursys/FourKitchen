spring:
  application:
    name: ms-usuarios
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 20000
      connection-timeout: 10000
      max-lifetime: 60000
  jpa:
    hibernate:
      ddl-auto: none

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret: ${JWT_SECRET:fourkitchen-local-development-jwt-secret-32}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
