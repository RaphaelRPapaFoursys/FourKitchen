<script>
const data = JSON.parse(document.getElementById('graph-data').textContent);
const colors = {
  'Frontend': '#2563eb',
  'BFF Restaurante': '#147a7e',
  'Mesas MS': '#7c3aed',
  'Pedidos MS': '#dc2626',
  'Produtos MS': '#16a34a',
  'Usuarios MS': '#b45309',
  'Notificacoes MS': '#c026d3',
  'Infra / Build': '#475569',
  'Shared / External': '#64748b'
};
const categoryOrder = Object.keys(colors);
let selectedId = null;
let activeView = 'map';
const search = document.getElementById('search');
const category = document.getElementById('category');
const detail = document.getElementById('detail');

function fmt(n) { return new Intl.NumberFormat('pt-BR').format(n); }
function esc(s) { return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function short(s, len=46) { s = String(s ?? ''); return s.length > len ? s.slice(0, len - 1) + '…' : s; }
function matches(c) {
  const q = search.value.trim().toLowerCase();
  const cat = category.value;
  if (cat && c.category !== cat) return false;
  if (!q) return true;
  const hay = [c.label, c.category, ...c.topFiles.map(f => f.path), ...c.topNodes.map(n => n.label)].join(' ').toLowerCase();
  return hay.includes(q);
}
function visibleCommunities() { return data.communities.filter(matches); }
function selectedCommunity() { return data.communities.find(c => c.id === selectedId) || visibleCommunities()[0] || data.communities[0]; }

function renderMetrics() {
  const m = data.meta;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><b>${fmt(m.nodes)}</b><span>nós</span></div>
    <div class="metric"><b>${fmt(m.links)}</b><span>arestas</span></div>
    <div class="metric"><b>${fmt(m.communities)}</b><span>comunidades</span></div>
    <div class="metric"><b>${fmt(m.crossCommunityLinks)}</b><span>conexões entre módulos</span></div>
    <div class="metric"><b>${fmt(m.danglingEdges)}</b><span>arestas penduradas no diagnóstico</span></div>`;
  document.getElementById('health').textContent = m.danglingEdges || m.collapsedEdges
    ? `Diagnóstico: ${fmt(m.danglingEdges)} dangling edges e ${fmt(m.collapsedEdges)} arestas colapsadas. Use como mapa de navegação, não como verdade perfeita.`
    : 'Diagnóstico do grafo sem alertas relevantes.';
}
function renderControls() {
  const cats = [...new Set(data.communities.map(c => c.category))].sort((a,b) => categoryOrder.indexOf(a) - categoryOrder.indexOf(b));
  category.innerHTML = '<option value="">Todas as áreas</option>' + cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  document.getElementById('legend').innerHTML = cats.map(c => `<span><i class="swatch" style="background:${colors[c] || '#777'}"></i>${esc(c)}</span>`).join('');
}
function layoutCommunities(items) {
  const groups = new Map();
  for (const c of items) {
    if (!groups.has(c.category)) groups.set(c.category, []);
    groups.get(c.category).push(c);
  }
  const cats = categoryOrder.filter(c => groups.has(c)).concat([...groups.keys()].filter(c => !categoryOrder.includes(c)));
  const colW = 178, rowH = 66, left = 84, top = 74;
  const pos = new Map();
  let maxRows = 1;
  cats.forEach((cat, ci) => {
    const arr = groups.get(cat).sort((a,b) => b.crossDegree - a.crossDegree || b.size - a.size);
    maxRows = Math.max(maxRows, arr.length);
    arr.forEach((c, ri) => pos.set(c.id, {x: left + ci * colW, y: top + ri * rowH, cat}));
  });
  return {pos, width: Math.max(1100, left * 2 + cats.length * colW), height: Math.max(560, top * 2 + maxRows * rowH)};
}
function renderGraph() {
  const items = visibleCommunities();
  const ids = new Set(items.map(c => c.id));
  const svg = document.getElementById('graph');
  const lay = layoutCommunities(items);
  svg.setAttribute('width', lay.width);
  svg.setAttribute('height', lay.height);
  const links = data.links.filter(e => ids.has(e.source) && ids.has(e.target)).slice(0, 180);
  const selected = selectedId;
  let out = '<g>';
  for (const e of links) {
    const a = lay.pos.get(e.source), b = lay.pos.get(e.target);
    if (!a || !b) continue;
    const hot = selected && (e.source === selected || e.target === selected);
    const dim = selected && !hot;
    const dx = Math.abs(b.x - a.x) * .45 + 40;
    const d = `M${a.x},${a.y} C${a.x + dx},${a.y} ${b.x - dx},${b.y} ${b.x},${b.y}`;
    out += `<path class="edge ${hot ? 'hot' : ''} ${dim ? 'dim' : ''}" d="${d}" stroke-width="${Math.max(1, Math.min(8, Math.sqrt(e.weight)))}"><title>${esc(e.weight + ' relações')}</title></path>`;
  }
  for (const c of items) {
    const p = lay.pos.get(c.id); if (!p) continue;
    const isSel = c.id === selected;
    const dim = selected && !isSel && !links.some(e => (e.source === selected && e.target === c.id) || (e.target === selected && e.source === c.id));
    const r = Math.max(9, Math.min(24, 7 + Math.sqrt(c.size) * 1.6));
    out += `<g class="node ${isSel ? 'selected' : ''} ${dim ? 'dim' : ''}" transform="translate(${p.x},${p.y})" data-id="${esc(c.id)}">
      <circle r="${r}" fill="${colors[c.category] || '#777'}"><title>${esc(c.label)}
${c.size} nós · ${c.crossDegree} conexões externas</title></circle>
      <text x="${r + 6}" y="4">${esc(short(c.label, 32))}</text>
    </g>`;
  }
  out += '</g>';
  svg.innerHTML = out;
  svg.querySelectorAll('.node').forEach(el => el.addEventListener('click', () => { selectedId = el.dataset.id; renderAll(false); }));
}
function renderTable() {
  const rows = visibleCommunities().sort((a,b) => b.crossDegree - a.crossDegree || b.size - a.size);
  document.getElementById('community-table').innerHTML = `<thead><tr><th>Comunidade</th><th>Área</th><th>Nós</th><th>Arquivos</th><th>Conexões externas</th><th>Relações dominantes</th></tr></thead><tbody>` + rows.map(c => `
    <tr data-id="${esc(c.id)}"><td><b>${esc(c.label)}</b><div class="path">#${esc(c.id)}</div></td><td><span class="badge"><i class="swatch" style="background:${colors[c.category] || '#777'}"></i>${esc(c.category)}</span></td><td>${fmt(c.size)}</td><td>${fmt(c.files)}</td><td>${fmt(c.crossDegree)}</td><td>${c.topRelations.map(r => `<span class="badge">${esc(r[0])} ${fmt(r[1])}</span>`).join(' ')}</td></tr>`).join('') + '</tbody>';
  document.querySelectorAll('#community-table tr[data-id]').forEach(row => row.addEventListener('click', () => { selectedId = row.dataset.id; activeView = 'map'; renderAll(); }));
}
function renderBridges() {
  document.getElementById('bridge-list').innerHTML = data.bridges.map(b => `<div class="bridge"><b>${esc(b.label)} <span class="badge">${fmt(b.degree)} arestas</span></b><div>${esc(b.communityLabel)}</div><div class="path">${esc(b.source)} ${esc(b.location)}</div></div>`).join('');
}
function renderDetail() {
  const c = selectedCommunity();
  if (!c) { detail.innerHTML = '<p>Nenhuma comunidade encontrada.</p>'; return; }
  selectedId = c.id;
  const connected = data.links.filter(e => e.source === c.id || e.target === c.id).slice(0, 8).map(e => {
    const other = data.communities.find(x => x.id === (e.source === c.id ? e.target : e.source));
    return `<li><b>${esc(other ? other.label : 'Comunidade ' + (e.source === c.id ? e.target : e.source))}</b> <span class="badge">${fmt(e.weight)} relações</span></li>`;
  }).join('');
  detail.innerHTML = `<h3>${esc(c.label)}</h3><div class="sub">${esc(c.category)} · comunidade #${esc(c.id)}</div>
    <div class="kv"><span>Nós</span><b>${fmt(c.size)}</b><span>Arquivos</span><b>${fmt(c.files)}</b><span>Externas</span><b>${fmt(c.crossDegree)}</b><span>Internas</span><b>${fmt(c.internalDegree)}</b></div>
    <h4>Nós centrais</h4><ul>${c.topNodes.map(n => `<li><b>${esc(n.label)}</b> <span class="badge">${fmt(n.degree)}</span><div class="path">${esc(n.source)} ${esc(n.location)}</div></li>`).join('')}</ul>
    <h4>Arquivos frequentes</h4><ul>${c.topFiles.map(f => `<li><span class="path">${esc(f.path)}</span> <span class="badge">${fmt(f.count)}</span></li>`).join('')}</ul>
    <h4>Conecta com</h4><ul>${connected || '<li>Sem conexões externas fortes no recorte atual.</li>'}</ul>`;
}
function renderTabs() {
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.view === activeView));
  document.querySelectorAll('.view').forEach(view => view.classList.toggle('active', view.id === activeView));
}
function renderAll(redrawTable=true) { renderTabs(); renderMetrics(); renderGraph(); if (redrawTable) renderTable(); renderBridges(); renderDetail(); }

document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => { activeView = btn.dataset.view; renderAll(false); }));
search.addEventListener('input', () => { selectedId = null; renderAll(); });
category.addEventListener('change', () => { selectedId = null; renderAll(); });
document.getElementById('reset').addEventListener('click', () => { search.value = ''; category.value = ''; selectedId = null; activeView = 'map'; renderAll(); });
renderControls();
renderAll();
</script>
</body>
</html>
