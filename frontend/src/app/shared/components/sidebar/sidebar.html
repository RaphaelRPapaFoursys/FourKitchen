<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__brand-mark" aria-hidden="true">
      <img src="favicon.ico" alt="" />
    </span>
    <span class="sidebar__brand-name">FourKitchen</span>
  </div>

  <nav class="sidebar__nav">
    <a
      class="sidebar__nav-item"
      routerLink="/gestor"
      routerLinkActive="sidebar__nav-item--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <fk-icon name="shirt-folded" size="1.15rem" />
      <span class="sidebar__label">Gestão</span>
    </a>
    <a
      class="sidebar__nav-item"
      routerLink="/gestor/categorias"
      routerLinkActive="sidebar__nav-item--active"
    >
      <fk-icon name="bag" size="1.15rem" />
      <span class="sidebar__label">Categorias</span>
    </a>
    <a
      class="sidebar__nav-item"
      routerLink="/gestor/produtos"
      routerLinkActive="sidebar__nav-item--active"
    >
      <fk-icon name="fork-knife" size="1.15rem" />
      <span class="sidebar__label">Produtos</span>
    </a>
    <a
      class="sidebar__nav-item"
      routerLink="/gestor/usuarios"
      routerLinkActive="sidebar__nav-item--active"
    >
      <fk-icon name="user" size="1.15rem" />
      <span class="sidebar__label">Usuários</span>
    </a>
  </nav>

  <img
    class="sidebar__decor"
    src="assets/images/flor-e-listra-fourkitchen.png"
    alt=""
    aria-hidden="true"
  />

</aside>
