<header class="topbar" [class.topbar--sem-busca]="!mostrarBusca()">
  @if (mostrarBusca()) {
    <div class="topbar__search">
      <fk-icon name="magnifying-glass" size="1.15rem" />
      <input type="search" [placeholder]="buscaPlaceholder()" [ngModel]="busca()" (ngModelChange)="busca.set($event)" />
    </div>
  }

  <div class="topbar__acoes">
    <div class="topbar__notificacoes">
      <button
        class="topbar__notificacao"
        type="button"
        aria-label="Notificações"
        [attr.aria-expanded]="menuAberto() === 'notificacoes'"
        (click)="alternarMenu('notificacoes')"
      >
        <fk-icon name="bell-ringing" size="1.3rem" />
        @if (notificacoes(); as total) {
          <span class="topbar__notificacao-contagem" aria-hidden="true">{{ total }}</span>
        } @else {
          <span class="topbar__notificacao-dot" aria-hidden="true"></span>
        }
      </button>
      @if (menuAberto() === 'notificacoes') {
        <section class="topbar__notificacoes-painel" aria-label="Notificações">
          <strong>Notificações</strong>
          <p>Nenhuma nova notificação.</p>
        </section>
      }
    </div>

    <fk-user-menu
      [name]="usuarioNome()"
      [initial]="usuarioInicial()"
      [abertoControlado]="menuAberto() === 'avatar'"
      (alternarSolicitado)="alternarMenu('avatar')"
      (fecharSolicitado)="fecharMenus()"
    />
  </div>
</header>
