<main class="login-page">
  <img
    class="login-page__leaves"
    src="assets/images/login-leaves.png"
    alt=""
    aria-hidden="true"
  />

  <section class="login-shell" aria-labelledby="login-title">
    <img
      class="login-shell__logo"
      src="assets/images/fourkitchen-logo.png"
      alt="FourKitchen"
    />

    <div class="login-card">
      <header class="login-card__header">
        <h1 id="login-title">{{ 'LOGIN.TITLE' | translate }}</h1>
        <p>{{ 'LOGIN.SUBTITLE' | translate }}</p>
      </header>

      <app-login-form
        [form]="loginForm"
        [authErrorMessage]="authErrorMessage()"
        [isLoading]="isLoading()"
        [passwordVisible]="passwordVisible"
        [fieldInvalid]="isFieldInvalid.bind(this)"
        (submitted)="onSubmit()"
        (passwordVisibilityToggled)="togglePasswordVisibility()"
      />

      <div class="login-card__divider" role="separator"></div>

      <p class="login-card__access">
        {{ 'LOGIN.NO_ACCESS' | translate }}
        <a href="#">{{ 'LOGIN.REQUEST_ACCOUNT' | translate }}</a>
      </p>
    </div>
  </section>

  <app-login-footer />
</main>
