<form class="login-form" [formGroup]="form()" (ngSubmit)="submit()" novalidate>
  @if (authErrorMessage()) {
    <p class="login-form__auth-error" role="alert">{{ authErrorMessage() }}</p>
  }

  <div class="login-form__field">
    <label for="email">{{ 'LOGIN.CORPORATE_EMAIL' | translate }}</label>
    <div class="login-form__control" [class.login-form__control--invalid]="fieldInvalid()('email')">
      <input
        id="email"
        type="email"
        formControlName="email"
        [placeholder]="'PLACEHOLDER.CORPORATE_EMAIL' | translate"
        autocomplete="email"
        aria-describedby="email-error"
      />
      <img src="assets/icons/mail.svg" alt="" aria-hidden="true" />
    </div>
    @if (fieldInvalid()('email')) {
      <p class="login-form__error" id="email-error">{{ 'VALIDATION.EMAIL_INVALID' | translate }}</p>
    }
  </div>

  <div class="login-form__field">
    <label for="password">{{ 'LOGIN.PASSWORD' | translate }}</label>
    <div class="login-form__control" [class.login-form__control--invalid]="fieldInvalid()('password')">
      <input
        id="password"
        [type]="passwordVisible() ? 'text' : 'password'"
        formControlName="password"
        [placeholder]="'PLACEHOLDER.PASSWORD' | translate"
        autocomplete="current-password"
        aria-describedby="password-error"
      />
      <button
        class="login-form__icon-button"
        type="button"
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="passwordVisible() ? ('LOGIN.HIDE_PASSWORD' | translate) : ('LOGIN.SHOW_PASSWORD' | translate)"
      >
        <img
          [src]="passwordVisible() ? 'assets/icons/eye-off.svg' : 'assets/icons/eye.svg'"
          alt=""
          aria-hidden="true"
        />
      </button>
    </div>
    @if (fieldInvalid()('password')) {
      <p class="login-form__error" id="password-error">{{ 'VALIDATION.PASSWORD_REQUIRED' | translate }}</p>
    }
  </div>

  <a class="login-form__forgot" href="#">{{ 'LOGIN.FORGOT_PASSWORD' | translate }}</a>

  <button class="login-form__submit" type="submit" [disabled]="form().invalid || isLoading()">
    <span>{{ isLoading() ? ('BUTTON.LOGGING_IN' | translate) : ('BUTTON.LOGIN' | translate) }}</span>
    <img src="assets/icons/arrow-right.svg" alt="" aria-hidden="true" />
  </button>
</form>
