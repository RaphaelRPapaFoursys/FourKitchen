<section class="order-success__content" aria-labelledby="success-title">
  <div class="order-success__icon" aria-hidden="true">✓</div>
  <h1 id="success-title">
    {{ isTotem() ? 'Pedido realizado com sucesso!' : 'Pedido enviado com sucesso!' }}
  </h1>
  <p>Seu pedido foi enviado para a cozinha.</p>

  @if (isTotem() && orderCode()) {
    <div class="order-success__number" aria-label="Número do pedido">
      <span>Número do pedido</span>
      <strong>#{{ orderCode() }}</strong>
      <small>Acompanhe seu pedido no painel.</small>
    </div>
  }

  <div class="order-success__actions" [class.order-success__actions--totem]="isTotem()">
    @if (showFollowOrder()) {
      <button class="order-success__primary" type="button" (click)="followOrder()">Acompanhar Pedido</button>
    }
    <button class="order-success__secondary" type="button" (click)="startNewOrder()">
      {{ isTotem() ? 'Voltar ao início' : 'Novo Pedido' }}
    </button>
  </div>
</section>
