<div class="categories-carousel">
  @if (canScrollLeft()) {
    <button class="categories-carousel__button categories-carousel__button--left" type="button" [attr.aria-label]="'CUSTOMER.PREVIOUS_CATEGORIES' | translate" (click)="requestScroll('left')">
      ‹
    </button>
  }

  <div
    class="categories__grid"
    #categoriesCarousel
    [class.categories__grid--dragging]="isDragging"
    (scroll)="notifyScrolled()"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)"
    (pointercancel)="onPointerCancel($event)"
    (pointerleave)="onPointerLeave($event)"
  >
    @for (category of categories(); track trackCategory()($index, category)) {
      <button
        class="category-card"
        type="button"
        [class.category-card--active]="selectedCategoryId() === category.categoriaId"
        (click)="onCategoryClick($event, category.categoriaId)"
      >
        <div class="category-card__media">
          <img [src]="categoryImage()(category)" [alt]="category.categoriaNome" loading="eager" draggable="false" (error)="useCategoryFallback($event)" />
        </div>

        <div class="category-card__content">
          <h3>{{ category.categoriaNome }}</h3>

        @if (category.categoriaDescricao) {
          <p>{{ category.categoriaDescricao }}</p>
       }
  </div>
      </button>
    }
  </div>

  @if (canScrollRight()) {
    <button class="categories-carousel__button categories-carousel__button--right" type="button" [attr.aria-label]="'CUSTOMER.NEXT_CATEGORIES' | translate" (click)="requestScroll('right')">
      ›
    </button>
  }
</div>
