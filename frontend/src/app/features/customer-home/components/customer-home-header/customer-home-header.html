<header class="customer-header" [class.customer-header--mesa]="showMesaActions()" id="home">
  <fk-language-selector />
  <a class="customer-header__brand" href="#home" (click)="selectSection('home', $event)" aria-label="FourKitchen Home">
    <img src="assets/images/fourkitchen-logo.png" alt="FourKitchen" />
  </a>

  <nav class="customer-nav" aria-label="Navegacao principal">
    <a class="customer-nav__link customer-nav__link--active" href="#home" (click)="selectSection('home', $event)">Home</a>
    <a class="customer-nav__link" href="#menu" (click)="selectSection('menu', $event)">Menu</a>
    @if (showOrdersLink()) {
      <a class="customer-nav__link customer-nav__link--orders" [href]="ordersRoute()" (click)="selectOrders($event)">Acompanhar Pedido</a>
    }
    @if (showMesaActions()) {
      <strong class="customer-nav__table" aria-live="polite">{{ tableLabel() }}</strong>
      <button
        type="button"
        class="customer-nav__call"
        [class.customer-nav__call--loading]="waiterCallLoading()"
        [attr.aria-label]="waiterCallLabel()"
        [attr.title]="waiterCallTitle()"
        [attr.aria-busy]="waiterCallLoading()"
        [disabled]="waiterCallDisabled()"
        (click)="selectWaiterCall()"
      >
        @if (waiterCallLoading()) {
          <span class="customer-nav__spinner" aria-hidden="true"></span>
        } @else {
          <fk-icon [name]="waiterCallSent() ? 'check-circle' : 'call-bell'" size="1.15rem" />
        }
        <span class="customer-nav__call-label">{{ waiterCallLabel() }}</span>
      </button>
    }
    <a class="customer-nav__link customer-nav__link--icon" [href]="cartRoute()" (click)="selectCart($event)">
      <span>Carrinho</span>
      @if (cartItemsCount() > 0) {
        <strong class="customer-nav__badge">{{ cartItemsCount() }}</strong>
      }
      <img src="assets/icons/cart.svg" alt="" aria-hidden="true" />
    </a>
  </nav>
</header>
