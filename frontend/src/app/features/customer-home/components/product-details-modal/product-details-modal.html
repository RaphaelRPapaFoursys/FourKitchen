<div class="product-modal" role="presentation" (click)="close()">
  <section
    class="product-modal__card"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'Detalhes de ' + product().nome"
    (click)="$event.stopPropagation()"
  >
    <button class="product-modal__close" type="button" aria-label="Fechar detalhes" (click)="close()">
      x
    </button>

    <div class="product-modal__media">
      <img [src]="productImage()(product())" [alt]="product().nome" />
    </div>

    <div class="product-modal__content">
      <div class="product-modal__heading">
        <h2>{{ product().nome }}</h2>
        <strong>{{ formatPrice()(product().preco) }}</strong>
      </div>

      <p class="product-modal__description">{{ product().descricao }}</p>

      <label class="product-modal__notes">
        <span>
          <img src="assets/icons/menu.svg" alt="" aria-hidden="true" />
          Observacoes
        </span>
        <textarea
          rows="3"
          placeholder="Ex: sem cebola, ponto da carne..."
          [ngModel]="observation()"
          (ngModelChange)="updateObservation($event)"
        ></textarea>
      </label>
    </div>

    <footer class="product-modal__actions">
      <div class="quantity-control" aria-label="Quantidade">
        <button type="button" aria-label="Diminuir quantidade" (click)="decreaseQuantity()">-</button>
        <span>{{ quantity() }}</span>
        <button type="button" aria-label="Aumentar quantidade" (click)="increaseQuantity()">+</button>
      </div>

      <button class="product-modal__add" type="button" (click)="submit()">
        <img src="assets/icons/cart.svg" alt="" aria-hidden="true" />
        Adicionar ao Carrinho
      </button>
    </footer>
  </section>
</div>
