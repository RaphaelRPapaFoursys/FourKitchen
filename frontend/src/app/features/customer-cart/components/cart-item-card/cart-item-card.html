<article class="cart-item">
  <div class="cart-item__media">
    <img [src]="productImage()(item())" [alt]="item().name" />
  </div>

  <div class="cart-item__content">
    <h2>{{ item().name }}</h2>
    <p>{{ item().description }}</p>
    @if (observationEditable()) {
      <label class="cart-item__observation">
        <span>{{ 'CUSTOMER.OBSERVATION' | translate }}</span>
        <input
          type="text"
          [value]="item().observation ?? ''"
          [attr.maxlength]="observationMaxLength"
          placeholder="Ex.: sem cebola"
          (input)="updateObservation($event)"
        />
      </label>
    } @else if (item().observation) {
      <p>Obs: {{ item().observation }}</p>
    }
  </div>

  <div class="cart-item__quantity" [attr.aria-label]="'CUSTOMER.QUANTITY' | translate">
    <button type="button" [attr.aria-label]="'CUSTOMER.DECREASE_QUANTITY' | translate" (click)="decreaseQuantity()">-</button>
    <span>{{ item().quantity }}</span>
    <button type="button" [attr.aria-label]="'CUSTOMER.INCREASE_QUANTITY' | translate" (click)="increaseQuantity()">+</button>
  </div>

  <strong>{{ formatPrice()(item().unitPrice * item().quantity) }}</strong>

  <button class="cart-item__remove" type="button" [attr.aria-label]="'CUSTOMER.REMOVE_ITEM' | translate" (click)="removeItem()">
    x
  </button>
</article>
